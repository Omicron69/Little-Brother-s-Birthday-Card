<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duck Hunt — Zapper Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --nes-sky: #5c94fc;
    --nes-grass: #2ea82e;
    --nes-dark: #000000;
    --nes-white: #fcfcfc;
    --nes-red: #d82800;
    --nes-yellow: #f8b800;
    --nes-brown: #503000;
  }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
  }
  #app {
    position: relative;
    width: 768px;
    height: 576px;
    overflow: hidden;
    border: 4px solid #444;
    box-shadow: 0 0 60px #000, 0 0 120px rgba(92,148,252,0.3);
    cursor: none;
  }
  #game-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: var(--nes-sky);
    image-rendering: pixelated;
  }
  #app::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 100;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 50;
    background: rgba(0,0,0,0.5);
  }
  #hud span { color: var(--nes-white); font-size: 10px; text-shadow: 2px 2px 0 #000; }
  #bullets-display { display: flex; gap: 4px; }
  .bullet-pip { width: 8px; height: 12px; background: var(--nes-yellow); border: 1px solid #000; box-shadow: 1px 1px 0 #a07800; transition: background 0.1s; }
  .bullet-pip.empty { background: #333; box-shadow: 1px 1px 0 #111; }
  #crosshair {
    position: absolute;
    width: 40px; height: 40px;
    pointer-events: none;
    z-index: 80;
    transform: translate(-50%, -50%);
  }
  #crosshair svg { width: 100%; height: 100%; }
  #dog-laugh {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #dog-laugh-img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid var(--nes-yellow);
    box-shadow: 0 0 20px rgba(248,184,0,0.8);
    animation: dogBounce 0.3s ease-in-out infinite alternate;
    image-rendering: pixelated;
  }
  @keyframes dogBounce { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-8px) rotate(5deg); } }
  #dog-laugh .msg {
    color: var(--nes-yellow);
    font-size: 11px;
    text-shadow: 2px 2px 0 #000, 0 0 10px rgba(248,184,0,0.8);
    animation: blink 0.4s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #miss-counter-display {
    position: absolute;
    bottom: 85px;
    left: 12px;
    font-size: 8px;
    color: var(--nes-red);
    z-index: 55;
    text-shadow: 1px 1px 0 #000;
  }
  #round-banner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    z-index: 90;
    gap: 14px;
  }
  #round-banner h1 { color: var(--nes-yellow); font-size: 20px; text-shadow: 3px 3px 0 var(--nes-red); }
  #round-banner p { color: var(--nes-white); font-size: 10px; text-align: center; line-height: 2; }
  #round-banner .tip { color: #bbb; font-size: 8px; text-align: center; line-height: 2.2; }
  #start-btn {
    margin-top: 10px;
    padding: 12px 24px;
    background: var(--nes-red);
    color: var(--nes-white);
    border: 3px solid var(--nes-white);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  .score-pop {
    position: absolute;
    color: var(--nes-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 70;
    animation: scoreFloat 0.9s ease-out forwards;
  }
  .miss-pop {
    position: absolute;
    color: #ff4444;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    z-index: 70;
    animation: scoreFloat 0.9s ease-out forwards;
  }
  @keyframes scoreFloat { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-52px); } }
  #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 75; transition: opacity 0.05s; }
  #cam-wrap {
    position: absolute;
    bottom: 85px; right: 8px;
    width: 120px; height: 90px;
    border: 2px solid #333;
    overflow: hidden;
    z-index: 60;
    opacity: 0.75;
  }
  #cam-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  #ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--nes-grass);
    border-top: 4px solid #1a6e1a;
    z-index: 40;
  }
  #ground-text {
    position: absolute;
    top: 4px; left: 16px; right: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #ground-text span { color: #000; font-size: 8px; }
  #hand-indicator { position: absolute; top: 28px; right: 8px; font-size: 7px; color: #0f0; z-index: 55; text-shadow: 1px 1px 0 #000; }
  #gesture-debug { position: absolute; top: 40px; right: 8px; font-size: 6px; color: #ff0; z-index: 55; text-shadow: 1px 1px 0 #000; text-align: right; }
  /* Round transition */
  #round-flash {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 88;
  }
  #round-flash h2 { color: var(--nes-yellow); font-size: 22px; text-shadow: 3px 3px 0 var(--nes-red); animation: roundPop 0.5s ease-out; }
  @keyframes roundPop { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }
</style>
</head>
<body>
<div id="app">
  <canvas id="game-canvas"></canvas>
  <div id="flash"></div>

  <div id="hud">
    <span>SCORE <span id="score-val">00000</span></span>

    <div id="bullets-display"></div>
  </div>

  <div id="gesture-debug"></div>
  <div id="miss-counter-display"></div>

// ─── DRAWING ─────────────────────────────────────────────────────────────────
const P = 4;
function px(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * P, y * P, P, P);
}

function drawSky() {
  ctx.fillStyle = '#5c94fc';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  drawCloud(18, 18); drawCloud(95, 8); drawCloud(158, 22); drawCloud(60, 35);
}

function drawCloud(gx, gy) {
  const c = '#fcfcfc';
  ['  XXX  ',' XXXXX ','XXXXXXX','XXXXXXX',' XXXXX '].forEach((row, dy) => {
    [...row].forEach((ch, dx) => { if (ch==='X') px(gx+dx, gy+dy, c); });
  });
}

// Draw photo-duck (circular crop, bouncing)
function drawPhotoDuck(x, y, size, wobble) {
  if (!DUCK_IMG.complete || DUCK_IMG.naturalWidth === 0) return;
  ctx.save();
  // wobble
  ctx.translate(x + size/2, y + size/2);
  ctx.rotate(Math.sin(wobble) * 0.12);
  // circular clip
  ctx.beginPath();
  ctx.arc(0, 0, size/2, 0, Math.PI*2);
  ctx.clip();
  // draw image centered
  ctx.drawImage(DUCK_IMG, -size/2, -size/2, size, size);
  // glowing border
  ctx.restore();
  ctx.save();
  ctx.translate(x + size/2, y + size/2);
  ctx.strokeStyle = 'rgba(255,220,0,0.9)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, size/2, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// Draw falling (spinning)
function drawPhotoDuckFalling(x, y, size, spin) {
  if (!DUCK_IMG.complete || DUCK_IMG.naturalWidth === 0) return;
  ctx.save();
  ctx.translate(x + size/2, y + size/2);
  ctx.rotate(spin);
  ctx.beginPath();
  ctx.arc(0, 0, size/2, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(DUCK_IMG, -size/2, -size/2, size, size);
  ctx.restore();
}

function drawDog() {
  // simple pixel dog peeking from grass
  const gx = 20, gy = Math.floor((GAME_H - 16) / P);
  const body = '#c8a050', outline = '#000', white = '#f0d890';
  ['  OOOO  ',' OBBBBO ','OBWWWWBO','OBWWWWBO','OBBBBBO ',' OOOOO  '].forEach((row, dy) => {
    [...row].forEach((ch, dx) => {
      if (ch==='O') px(gx+dx, gy+dy, outline);
      else if (ch==='B') px(gx+dx, gy+dy, body);
      else if (ch==='W') px(gx+dx, gy+dy, white);
    });
  });
}

// ─── DUCK CLASS ───────────────────────────────────────────────────────────────
const DUCK_SIZE = 64;

class Duck {
  constructor(id) {
    this.id = id;
    this.state = 'alive'; // alive | hit | falling | gone
    this.wobble = Math.random() * Math.PI * 2;
    this.spin = 0;
    this.fallVY = 0;
    this.reset();
  }

  reset() {
    // Spawn from bottom, fly upward
    this.x = 60 + Math.random() * (GAME_W - 180);
    this.y = GAME_H - 80;
    const speed = 1.8 + round * 0.15;
    this.vx = (Math.random() * speed + 0.8) * (Math.random() < 0.5 ? 1 : -1);
    this.vy = -(Math.random() * speed * 0.7 + 1.2);
    this.state = 'alive';
    this.wobble = Math.random() * Math.PI * 2;
    this.spin = 0;
    this.fallVY = 0;
  }

  update(dt) {
    const s = dt * 0.055;
    if (this.state === 'alive') {
      this.x += this.vx * s;
      this.y += this.vy * s;
      this.wobble += 0.08;
      if (this.x < 10) { this.x = 10; this.vx = Math.abs(this.vx); }
      if (this.x > GAME_W - DUCK_SIZE - 10) { this.x = GAME_W - DUCK_SIZE - 10; this.vx = -Math.abs(this.vx); }
      if (this.y < 10) { this.vy = Math.abs(this.vy) * 0.7; }
      if (this.y > GAME_H - 90) { this.vy = -(Math.abs(this.vy) + 0.5); }
    } else if (this.state === 'falling') {
      this.fallVY += 0.15 * dt * 0.055;
      this.y += this.fallVY * dt * 0.055 * 60;
      this.spin += 0.15;
      if (this.y > GAME_H + 80) this.state = 'gone';
    }
  }

  draw() {
    if (this.state === 'alive') {
      drawPhotoDuck(this.x, this.y, DUCK_SIZE, this.wobble);
    } else if (this.state === 'falling') {
      drawPhotoDuckFalling(this.x, this.y, DUCK_SIZE, this.spin);
    }
  }

  hitTest(wx, wy) {
    const cx = this.x + DUCK_SIZE/2, cy = this.y + DUCK_SIZE/2;
    return Math.hypot(wx - cx, wy - cy) < DUCK_SIZE/2 + 8;
  }
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────

function ducksPerRound(r) {
  if (r <= 2) return 1;
  if (r <= 5) return 2;
  return 3;
}

function spawnDucks() {
  ducks = [];
  const count = ducksPerRound(round);
  for (let i = 0; i < count; i++) ducks.push(new Duck(i));
  totalVal.textContent = count;
}

function startRound() {
  state = 'playing';
  bullets = MAX_BULLETS;
  ducksShotThisRound = 0;
  missesThisRound = 0;
  dogState = 'hide';
  roundBanner.style.display = 'none';
  dogLaugh.style.display = 'none';
  roundVal.textContent = round;
  roundText.textContent = `ROUND ${round}`;
  missDisplay.textContent = '';
  updateBullets();
  spawnDucks();
}

function showRoundBanner(num) {
  roundFlashText.textContent = `ROUND ${num}`;
  roundFlash.style.display = 'flex';
  setTimeout(() => { roundFlash.style.display = 'none'; }, 1200);
}

function updateBullets() {
  bulletsDisplay.innerHTML = '';
  for (let i = 0; i < MAX_BULLETS; i++) {
    const pip = document.createElement('div');
    pip.className = 'bullet-pip' + (i >= bullets ? ' empty' : '');
    bulletsDisplay.appendChild(pip);
  }
  ammoText.textContent = 'AMMO: ' + '█'.repeat(bullets) + '░'.repeat(MAX_BULLETS - bullets);
}

function triggerDogLaugh() {
  dogLaugh.style.display = 'flex';
  dogState = 'laugh';
  setTimeout(() => {
    dogLaugh.style.display = 'none';
    dogState = 'hide';
  }, 2200);
}

function shoot() {
  const now = Date.now();
  if (now - lastShootTime < SHOOT_COOLDOWN) return;
  if (state !== 'playing') return;
  if (bullets <= 0) return;

  lastShootTime = now;
  bullets--;
  updateBullets();

  flash.style.opacity = '0.6';
  setTimeout(() => flash.style.opacity = '0', 80);

  const worldX = crossX * GAME_W;
  const worldY = crossY * (GAME_H + 80);

  let hit = false;
  for (const duck of ducks) {
    if (duck.state === 'alive' && duck.hitTest(worldX, worldY)) {
      duck.state = 'hit';
      duck.fallVY = 0;
      setTimeout(() => { duck.state = 'falling'; }, 180);
      const pts = round * 500;
      score += pts;
      scoreVal.textContent = String(score).padStart(5, '0');
      ducksShotThisRound++;
      hitVal.textContent = ducksShotThisRound;
      showPop(worldX, worldY, '+' + pts, false);
      hit = true;
    }
  }

  if (!hit) {
    // Missed shot
    totalMisses++;
    missesThisRound++;
    showPop(worldX, worldY, 'MISS!', true);
    missDisplay.textContent = `MISSES: ${totalMisses}`;
    // Every 2 misses, dog laughs
    if (totalMisses % MISS_LAUGH_THRESHOLD === 0) {
      triggerDogLaugh();
    }
  }

  checkRoundEnd();
}

function showPop(x, y, text, isMiss) {
  const el = document.createElement('div');
  el.className = isMiss ? 'miss-pop' : 'score-pop';
  el.textContent = text;
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 20) + 'px';
  document.getElementById('app').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function checkRoundEnd() {
  const aliveDucks = ducks.filter(d => d.state === 'alive').length;
  const allDone = ducks.every(d => d.state === 'gone' || d.state === 'falling' || d.state === 'hit');

  if (allDone && ducks.filter(d => d.state !== 'gone').length === 0) {
    // wait for last duck to finish falling
  }

  // All ducks accounted for (shot or flew away)
  const notAlive = ducks.every(d => d.state !== 'alive');
  if (notAlive || (bullets <= 0 && aliveDucks > 0)) {
    if (bullets <= 0 && aliveDucks > 0) {
      // fly away
      ducks.forEach(d => { if (d.state === 'alive') { d.vy = -4; d.state = 'alive'; } });
    }
    setTimeout(() => {
      if (round >= MAX_ROUNDS) {
        showGameOver();
      } else {
        round++;
        showRoundBanner(round);
        setTimeout(() => startRound(), 1300);
      }
    }, ducks.some(d => d.state === 'falling') ? 1600 : 800);
  }
}

function showGameOver() {
  state = 'title';
  roundBanner.style.display = 'flex';
  document.getElementById('round-banner').innerHTML = `
    <h1>GAME OVER</h1>
    <p>FINAL SCORE: ${String(score).padStart(5,'0')}</p>
    <p>ROUND ${round} / ${MAX_ROUNDS} REACHED</p>
    <p>TOTAL MISSES: ${totalMisses}</p>
    <button id="start-btn" onclick="restartGame()">PLAY AGAIN</button>
  `;
}

function restartGame() {
  score = 0; round = 1; totalMisses = 0;
  scoreVal.textContent = '00000';
  document.getElementById('round-banner').innerHTML = '';
  roundBanner.style.display = 'none';
  startRound();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderGame(dt) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSky();
  ducks.forEach(d => { d.update(dt); d.draw(); });
}

let lastTime = 0;
function tick(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if (state === 'playing' || state === 'title') renderGame(dt);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ─── MEDIAPIPE ───────────────────────────────────────────────────────────────
const videoElement = document.getElementById('cam-preview');

function dist2D(a, b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function detectGunGesture(lm) {
  const wrist = lm[0], indexMCP = lm[5], indexTip = lm[8];
  const palmCenter = lm[9];
  const indexExtended = dist2D(indexTip, wrist) > dist2D(indexMCP, wrist) * 1.2;
  const middleCurled = dist2D(lm[12], palmCenter) < dist2D(lm[13], palmCenter) * 1.1;
  return { indexExtended, isGunPoint: indexExtended && middleCurled, indexTip };
}

function detectFist(lm) {
  const wrist = lm[0];
  const tips = [8,12,16,20].map(i=>lm[i]);
  const mcps = [5,9,13,17].map(i=>lm[i]);
  return tips.every((tip,i) => dist2D(tip,wrist) < dist2D(mcps[i],wrist) * 1.15);
}

function onHandResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    handIndicator.textContent = 'CAM: NO HAND';
    handIndicator.style.color = '#f88';
    gestureDebug.textContent = '';
    handsDetected = false;
    return;
  }
  handsDetected = true;
  handIndicator.textContent = 'CAM: ✋ HAND';
  handIndicator.style.color = '#0f0';

  const lm = results.multiHandLandmarks[0];
  const gesture = detectGunGesture(lm);
  const fist = detectFist(lm);

  if (gesture.indexExtended) {
    crossX = 1.0 - gesture.indexTip.x;
    crossY = gesture.indexTip.y;
  }
  crosshair.style.left = (crossX * 768) + 'px';
  crosshair.style.top = (crossY * 576) + 'px';
  crosshair.style.display = 'block';

  const wasFist = prevFistClosed;
  prevFistClosed = fist;

  gestureDebug.textContent = `IDX:${gesture.indexExtended?'EXT':'CRL'} FIST:${fist?'✊':'✋'}`;

  if (fist && !wasFist && state === 'playing') shoot();
}

async function initCamera() {
  try {
    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.6 });
    hands.onResults(onHandResults);
    const camera = new Camera(videoElement, {
      onFrame: async () => { await hands.send({ image: videoElement }); },
      width: 320, height: 240
    });
    await camera.start();
    handIndicator.textContent = 'CAM: ACTIVE';
    handIndicator.style.color = '#0f0';
    document.getElementById('cam-wrap').style.display = 'block';
  } catch(e) {
    handIndicator.textContent = 'CAM: DENIED';
    handIndicator.style.color = '#f44';
  }
}

// Mouse fallback
document.getElementById('app').addEventListener('mousemove', (e) => {
  if (handsDetected) return;
  const rect = e.currentTarget.getBoundingClientRect();
  crossX = (e.clientX - rect.left) / rect.width;
  crossY = (e.clientY - rect.top) / rect.height;
  crosshair.style.left = (crossX * 768) + 'px';
  crosshair.style.top = (crossY * 576) + 'px';
});
document.getElementById('app').addEventListener('click', (e) => {
  if (state === 'playing') shoot();
});

document.getElementById('start-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  roundBanner.style.display = 'none';
  showRoundBanner(1);
  setTimeout(() => startRound(), 1200);
  initCamera();
});

renderGame(0);
</script>
